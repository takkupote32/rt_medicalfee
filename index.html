<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>放射線治療 診療報酬シミュレーター 2026</title>
    <style>
        /* iOS Safari互換性を維持しつつ現代的なデザインへ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
            background-color: #F4F7F9;
            color: #2D3436;
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { color: #2D3436; margin-bottom: 20px; font-size: 22px; }
        h3 { color: #0984e3; font-size: 18px; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #e1e8ed; }
        h4 { margin: 10px 0; font-size: 16px; }
        
        .box {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        label { display: block; font-weight: 600; margin: 15px 0 8px 0; font-size: 14px; }
        
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 16px; /* iOSのズーム防止のため16px推奨 */
            background-color: #fcfcfc;
            box-sizing: border-box;
        }
        
        .radio-group { 
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .radio-inline { 
            background: #f1f2f6;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: normal; 
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .radio-inline input { margin-right: 8px; }
        
        .result-val { font-size: 36px; font-weight: 800; color: #d63031; margin: 10px 0; }
        .grand-result { background: #00b894; color: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .grand-result .result-val { color: white; }
        
        pre {
            background: #2d3436;
            color: #fab1a0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .info { background: #e3f2fd; color: #0277bd; padding: 12px; border-radius: 8px; font-size: 13px; margin: 10px 0; }
        .warning { background: #fff3e0; color: #e65100; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 15px; }
        
        .checkbox-label { 
            background: #0984e3; color: white; padding: 15px; border-radius: 8px; 
            text-align: center; font-size: 16px; cursor: pointer; display: block;
        }
        
        @media (min-width: 600px) {
            .grid { display: flex; gap: 20px; }
            .col { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚛️ 放射線治療 診療報酬シミュレーター 2026</h2>
    
    <div class="box">
        <h3>📋 基本設定</h3>
        <label>主たる照射方法</label>
        <select id="main_method" onchange="calculateAll()">
            <option value="前立腺VMAT">前立腺VMAT</option>
            <option value="全乳房(一連)">全乳房(一連)</option>
            <option value="IMRT">IMRT</option>
            <option value="1門照射">1門照射</option>
            <option value="対向2門">対向2門</option>
            <option value="非対向2門・3門照射">非対向2門・3門照射</option>
            <option value="4門以上・運動・原体照射">4門以上・運動・原体照射</option>
            <option value="全身照射TBI">全身照射TBI</option>
            <option value="緩和寡分割">緩和寡分割</option>
            <option value="ケロイド">ケロイド</option>
            <option value="肺定位SBRT">肺定位SBRT</option>
            <option value="脳定位SRT">脳定位SRT</option>
        </select>

        <label>患者負担割合</label>
        <div class="radio-group" onchange="calculateAll()">
            <label class="radio-inline"><input type="radio" name="ratio" value="1"> 1割</label>
            <label class="radio-inline"><input type="radio" name="ratio" value="2"> 2割</label>
            <label class="radio-inline"><input type="radio" name="ratio" value="3" checked> 3割</label>
        </div>

        <label>患者区分</label>
        <div class="radio-group" onchange="calculateAll()">
            <label class="radio-inline"><input type="radio" name="pt_type" id="pt_out" value="外来" checked> 外来</label>
            <label class="radio-inline"><input type="radio" name="pt_type" id="pt_in" value="入院"> 入院</label>
        </div>

        <div id="igrt_div">
            <label>IGRT区分</label>
            <div class="radio-group" onchange="calculateAll()">
                <label class="radio-inline"><input type="radio" name="igrt_val" id="igrt_none" value="なし" checked> なし</label>
                <label class="radio-inline"><input type="radio" name="igrt_val" id="igrt_tai" value="イ.体表"> イ.体表</label>
                <label class="radio-inline"><input type="radio" name="igrt_val" id="igrt_kotsu" value="ロ.骨構造"> ロ.骨構造</label>
                <label class="radio-inline"><input type="radio" name="igrt_val" id="igrt_shuyo" value="ハ.腫瘍"> ハ.腫瘍</label>
            </div>
        </div>

        <div id="fix_div">
            <label>体外照射用固定器具</label>
            <div class="radio-group" onchange="calculateAll()">
                <label class="radio-inline"><input type="radio" name="fix_val" id="fix_none" value="なし"> なし</label>
                <label class="radio-inline"><input type="radio" name="fix_val" id="fix_exist" value="作成あり"> 作成あり</label>
            </div>
        </div>
        
        <div id="breath_div">
            <label>呼吸性移動対策</label>
            <div class="radio-group" onchange="calculateAll()">
                <label class="radio-inline"><input type="radio" name="breath_val" id="breath_none" value="なし" checked> なし</label>
                <label class="radio-inline"><input type="radio" name="breath_val" id="breath_exist" value="あり"> あり</label>
            </div>
        </div>

        <div id="breast_igrt_div" style="display:none;">
            <label>IGRT(一連2400点)</label>
            <div class="radio-group" onchange="calculateAll()">
                <label class="radio-inline"><input type="radio" name="breast_igrt_val" id="breast_igrt_none" value="なし" checked> なし</label>
                <label class="radio-inline"><input type="radio" name="breast_igrt_val" id="breast_igrt_exist" value="あり"> あり</label>
            </div>
        </div>

        <div id="count_container">
            <label id="count_label">合計照射回数:</label>
            <input type="number" id="count_input" value="1" min="1" oninput="calculateAll()">
        </div>
        
        <div id="info_msg" class="info" style="display:none;"></div>
    </div>

    <div class="box">
        <h3>💰 会計計算結果 (ベース治療分)</h3>
        <div class="result-val" id="total_pay">¥ 0</div>
        <label>📋 計算内訳明細</label>
        <pre id="detail_output">ここに内訳が表示されます</pre>
        <div class="warning">
            ⚠️ 外来の場合、「外来放射線診療料」が別途加算されます。
        </div>
    </div>

    <label class="checkbox-label">
        <input type="checkbox" id="is_expanded" onchange="toggleExpand()"> 追加・変更分のシミュレーションを開く
    </label>
    
    <div id="expanded_content" style="display:none; margin-top:20px;">
        <div class="box">
            <h3>🔄 追加・変更シミュレーション</h3>
            <label class="radio-inline" style="justify-content: center; background: #ffeaa7;">
                <input type="checkbox" id="check_extra_2" onchange="onCheckExtra2Changed()"> 2回目の計算として実行する
            </label>
            
            <label>追加・変更する照射方法</label>
            <select id="ex_method" onchange="calculateAll()"></select>

            <div id="ex_count_container">
                <label id="ex_count_label">追加 照射回数:</label>
                <input type="number" id="ex_count_input" value="1" min="1" oninput="calculateAll()">
            </div>
            
            <div id="ex_igrt_div">
                <label>追加 IGRT区分</label>
                <div class="radio-group" onchange="calculateAll()">
                    <label class="radio-inline"><input type="radio" name="ex_igrt_val" id="ex_igrt_none" value="なし" checked> なし</label>
                    <label class="radio-inline"><input type="radio" name="ex_igrt_val" id="ex_igrt_tai" value="イ.体表"> イ.体表</label>
                    <label class="radio-inline"><input type="radio" name="ex_igrt_val" id="ex_igrt_kotsu" value="ロ.骨構造"> ロ.骨構造</label>
                    <label class="radio-inline"><input type="radio" name="ex_igrt_val" id="ex_igrt_shuyo" value="ハ.腫瘍"> ハ.腫瘍</label>
                </div>
            </div>

            <div id="ex_breath_div">
                <label>追加 呼吸性移動対策</label>
                <div class="radio-group" onchange="calculateAll()">
                    <label class="radio-inline"><input type="radio" name="ex_breath_val" id="ex_breath_none" value="なし" checked> なし</label>
                    <label class="radio-inline"><input type="radio" name="ex_breath_val" id="ex_breath_exist" value="あり"> あり</label>
                </div>
            </div>
        </div>

        <div class="box">
            <h3 id="ex_result_title">▼ 追加分のみの計算結果</h3>
            <div class="result-val" id="ex_pay_val" style="color: #fd9644;">¥ 0</div>
            <pre id="ex_detail_output">ここに内訳が表示されます</pre>
        </div>

        <div class="grand-result" id="grand_result_box">
            <h4 id="grand_title">🟩 総合計 (窓口負担額)</h4>
            <div class="result-val" id="grand_pay_val">¥ 0</div>
            <div id="grand_info_text"></div>
        </div>
    </div>
</div>

<script>
/* 既存の計算ロジックを維持 */
var one_series_methods = ["前立腺VMAT", "全乳房(一連)", "肺定位SBRT", "脳定位SRT", "全身照射TBI", "緩和寡分割"];
var outpatient_add_series = ["前立腺VMAT", "全乳房(一連)"];
var no_igrt_list = ["1門照射", "対向2門", "非対向2門・3門照射", "ケロイド", "全乳房(一連)", "前立腺VMAT", "肺定位SBRT", "脳定位SRT", "全身照射TBI", "緩和寡分割"];
var grid_fix_list = ["前立腺VMAT", "IMRT", "1門照射", "対向2門", "非対向2門・3門照射", "4門以上・運動・原体照射", "ケロイド"];
var breath_list = ["IMRT", "肺定位SBRT", "全乳房(一連)", "非対向2門・3門照射", "4門以上・運動・原体照射"];
var extra_methods_1st = ["前立腺VMAT", "全乳房(一連)", "IMRT", "1門照射", "対向2門", "非対向2門・3門照射", "4門以上・運動・原体照射", "ケロイド", "肺定位SBRT", "脳定位SRT", "全身照射TBI", "緩和寡分割"];
var extra_methods_2nd = ["1門照射", "対向2門", "非対向2門・3門照射", "4門以上・運動・原体照射", "ケロイド"];
var lastMainMethod = "";
var lastExMethod = "";

window.onload = function() { updateExtraOptions(); document.getElementById("main_method").value = "前立腺VMAT"; document.getElementById("fix_exist").checked = true; calculateAll(); };
function toggleExpand() { var isChecked = document.getElementById("is_expanded").checked; document.getElementById("expanded_content").style.display = isChecked ? "block" : "none"; calculateAll(); }
function onCheckExtra2Changed() { updateExtraOptions(); calculateAll(); }
function updateExtraOptions() { var check2 = document.getElementById("check_extra_2").checked; var exMethodSel = document.getElementById("ex_method"); if (!exMethodSel) return; var currentVal = exMethodSel.value; exMethodSel.innerHTML = ""; var list = check2 ? extra_methods_2nd : extra_methods_1st; for(var i=0; i<list.length; i++) { var opt = document.createElement("option"); opt.value = list[i]; opt.innerText = list[i]; exMethodSel.appendChild(opt); } if(list.indexOf(currentVal) !== -1) { exMethodSel.value = currentVal; } else { exMethodSel.value = check2 ? "1門照射" : "IMRT"; } }

function calculateAll() {
    var method = document.getElementById("main_method").value;
    var ratioRadio = document.querySelector('input[name="ratio"]:checked');
    var ratio = ratioRadio ? parseInt(ratioRadio.value) : 3;
    var ptTypeRadio = document.querySelector('input[name="pt_type"]:checked');
    var pt_type = ptTypeRadio ? ptTypeRadio.value : "外来";
    if (method !== lastMainMethod) {
        if (method === "前立腺VMAT") { document.getElementById("fix_exist").checked = true; } else { document.getElementById("fix_none").checked = true; }
        if (method === "IMRT") { document.getElementById("igrt_shuyo").checked = true; } else { document.getElementById("igrt_none").checked = true; }
        document.getElementById("breath_none").checked = true; document.getElementById("breast_igrt_none").checked = true; lastMainMethod = method;
    }
    var isNoIgrt = (no_igrt_list.indexOf(method) !== -1);
    if (isNoIgrt) { document.getElementById("igrt_none").checked = true; document.getElementById("igrt_div").style.display = "none"; } else { document.getElementById("igrt_div").style.display = "block"; }
    document.getElementById("fix_div").style.display = (grid_fix_list.indexOf(method) !== -1) ? "block" : "none";
    document.getElementById("breath_div").style.display = (breath_list.indexOf(method) !== -1) ? "block" : "none";
    document.getElementById("breast_igrt_div").style.display = (method === "全乳房(一連)") ? "block" : "none";
    var is_one_series = one_series_methods.indexOf(method) !== -1;
    var info_msg = document.getElementById("info_msg");
    var count_label = document.getElementById("count_label");
    var count_container = document.getElementById("count_container");
    if (is_one_series) {
        info_msg.style.display = "block"; info_msg.innerHTML = "💡 " + method + " は一連算定項目です";
        if (pt_type === "外来" && outpatient_add_series.indexOf(method) !== -1) { count_label.innerText = "外来治療回数 (加算用):"; count_container.style.display = "block"; } else { count_container.style.display = "none"; }
    } else { info_msg.style.display = "none"; count_label.innerText = "合計照射回数:"; count_container.style.display = "block"; }
    var count = parseInt(document.getElementById("count_input").value) || 1;
    var base_pts = 0; var formula_list = [];
    var exclude_m000 = ["肺定位SBRT", "脳定位SRT", "全身照射TBI", "緩和寡分割"];
    if (exclude_m000.indexOf(method) !== -1) { formula_list.push("・管理料(M000): 0点 (一連に含む)"); } else {
        var m000_pts = 4000; if (method === "1門照射" || method === "ケロイド" || method === "対向2門") m000_pts = 2700; else if (method === "非対向2門・3門照射") m000_pts = 3100; else if (method === "IMRT" || method === "前立腺VMAT") m000_pts = 5000; else if (method === "全乳房(一連)") m000_pts = 4000;
        base_pts += m000_pts; formula_list.push("・管理料(M000): " + m000_pts.toLocaleString() + "点"); base_pts += 330; formula_list.push("・放射線治療専任加算: 330点");
    }
    base_pts += 1100; formula_list.push("・安全管理料2: 1,100点");
    var fix_checked = document.querySelector('input[name="fix_val"]:checked'); var fix_var = fix_checked ? fix_checked.value : "なし";
    if (grid_fix_list.indexOf(method) !== -1 && fix_var === "作成あり") { base_pts += 1000; formula_list.push("・体外照射用固定器具加算: 1,000点"); }
    var breath_checked = document.querySelector('input[name="breath_val"]:checked'); var breath_var = breath_checked ? breath_checked.value : "なし";
    if (is_one_series) {
        if (method === "肺定位SBRT") { base_pts += 63000; formula_list.push("・定位照射(一連): 63,000点"); if (breath_var === "あり") { base_pts += 5000; formula_list.push("・呼吸性移動対策加算: 5,000点"); } } else if (method === "脳定位SRT") { base_pts += 63000; formula_list.push("・定位照射(一連): 63,000点"); } else if (method === "前立腺VMAT") { base_pts += (96500 + 9000); formula_list.push("・照射料(一連): 96,500点\n・IGRT(ハ.腫瘍 一連): 9,000点"); } else if (method === "全乳房(一連)") { base_pts += 41500; formula_list.push("・照射料(一連): 41,500点"); var b_igrt_checked = document.querySelector('input[name="breast_igrt_val"]:checked'); if (b_igrt_checked && b_igrt_checked.value === "あり") { base_pts += 2400; formula_list.push("・IGRT(一連): 2,400点"); } if (breath_var === "あり") { base_pts += 2400; formula_list.push("・呼吸性移動対策加算(一連): 2,400点"); } } else if (method === "全身照射TBI") { base_pts += 30000; formula_list.push("・全身照射(一連): 30,000点"); } else if (method === "緩和寡分割") { base_pts += 8000; formula_list.push("・緩和寡分割(一連): 8,000点"); }
        if (pt_type === "外来" && outpatient_add_series.indexOf(method) !== -1) { var out_pts = count * 100; base_pts += out_pts; formula_list.push("・外来放射線治療加算(100点) × " + count + "回: " + out_pts.toLocaleString() + "点"); }
    } else {
        var base_charge = 0; if (method === "IMRT") base_charge = 3000; else if (method === "4門以上・運動・原体照射") base_charge = 1750; else if (method === "対向2門" || method === "非対向2門・3門照射") base_charge = 1750; else if (method === "1門照射" || method === "ケロイド") base_charge = 840;
        var igrt_pts = 0; if (!isNoIgrt) { var igrt_checked = document.querySelector('input[name="igrt_val"]:checked'); var igrt_sel_val = igrt_checked ? igrt_checked.value : "なし"; var igrt_map = {"なし": 0, "イ.体表": 150, "ロ.骨構造": 300, "ハ.腫瘍": 450}; igrt_pts = igrt_map[igrt_sel_val] || 0; }
        var breath_per_shot = 0; if (breath_list.indexOf(method) !== -1 && breath_var === "あり") breath_per_shot = 150;
        base_pts += (base_charge + igrt_pts + breath_per_shot) * count; formula_list.push("--- 照射ごとの計算 ---"); formula_list.push("・照射料(" + base_charge + "点) × " + count + "回: " + (base_charge*count).toLocaleString() + "点"); if (igrt_pts > 0) formula_list.push("・IGRT(" + igrt_pts + "点) × " + count + "回: " + (igrt_pts*count).toLocaleString() + "点"); if (breath_per_shot > 0) formula_list.push("・呼吸性移動対策(" + breath_per_shot + "点) × " + count + "回: " + (breath_per_shot*count).toLocaleString() + "点"); if (pt_type === "外来") { var out_pts = count * 100; base_pts += out_pts; formula_list.push("・外来放射線治療加算(100点) × " + count + "回: " + out_pts.toLocaleString() + "点"); }
    }
    var final_pay = base_pts * 10 * (ratio / 10); document.getElementById("total_pay").innerText = "¥ " + Math.round(final_pay).toLocaleString(); document.getElementById("detail_output").innerText = formula_list.join("\n") + "\n----------------------------\n合計点数: " + base_pts.toLocaleString() + " 点\n計算式: " + base_pts.toLocaleString() + "点 × 10円 × " + (ratio/10) + " = ¥" + Math.round(final_pay).toLocaleString();
    
    /* 拡張領域の処理 */
    var isExpanded = document.getElementById("is_expanded").checked;
    if (isExpanded) {
        var check_extra_2 = document.getElementById("check_extra_2").checked; var ex_method = document.getElementById("ex_method").value; if(!ex_method) return;
        if (ex_method !== lastExMethod) { document.getElementById("ex_igrt_none").checked = true; document.getElementById("ex_breath_none").checked = true; lastExMethod = ex_method; }
        var is_ex_one_series = one_series_methods.indexOf(ex_method) !== -1; var ex_count = 1; if (!check_extra_2 && is_ex_one_series && outpatient_add_series.indexOf(ex_method) === -1) { document.getElementById("ex_count_container").style.display = "none"; } else { document.getElementById("ex_count_container").style.display = "block"; ex_count = parseInt(document.getElementById("ex_count_input").value) || 1; }
        var isExNoIgrt = (no_igrt_list.indexOf(ex_method) !== -1); if (!check_extra_2 && !isExNoIgrt) { document.getElementById("ex_igrt_div").style.display = "block"; } else { document.getElementById("ex_igrt_none").checked = true; document.getElementById("ex_igrt_div").style.display = "none"; }
        var ex_breath_allowed = false; if (check_extra_2 && (ex_method === "非対向2門・3門照射" || ex_method === "4門以上・運動・原体照射")) ex_breath_allowed = true; if (!check_extra_2 && ["IMRT", "非対向2門・3門照射", "4門以上・運動・原体照射"].indexOf(ex_method) !== -1) ex_breath_allowed = true; document.getElementById("ex_breath_div").style.display = ex_breath_allowed ? "block" : "none";
        var extra_pts = 0; var extra_formula = [];
        if (check_extra_2) {
